<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Indoor AR - Compass Aligned</title>
    <script src='https://aframe.io/releases/1.4.0/aframe.min.js'></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
        AFRAME.registerComponent('place-at-bearing', {
            schema: {
                bearing: { type: 'number', default: 0 },
                distance: { type: 'number', default: 10 },
                height: { type: 'number', default: 0 }
            },
            init: function () {
                const rad = THREE.MathUtils.degToRad(this.data.bearing);
                const x = this.data.distance * Math.sin(rad);
                const z = -this.data.distance * Math.cos(rad);
                this.el.setAttribute('position', { x: x, y: this.data.height, z: z });
            }
        });
    </script>
</head>
<body style='margin: 0; overflow: hidden;'>
    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs='sourceType: webcam; debugUIEnabled: false;'>

        <a-assets>
            <a-asset-item id="dog" response-type="arraybuffer" src="./Dog.glb"></a-asset-item>
        </a-assets>

        <!-- Wrapper entity handles position/bearing -->
        <a-entity place-at-bearing="bearing: 45; distance: 3; height: 0">
            <!-- Inner entity handles model + scale independently -->
            <a-entity
                gltf-model="#dog"
                scale="0.5 0.5 0.5"
                rotation="0 0 0"
                animation-mixer="clip: Animation; loop: repeat">
            </a-entity>
        </a-entity>

        <a-camera look-controls="enabled: true"></a-camera>

    </a-scene>
</body>
</html>
