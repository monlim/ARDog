<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Indoor AR - Compass Aligned</title>
    <script src='https://aframe.io/releases/1.4.0/aframe.min.js'></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
        AFRAME.registerComponent('place-at-bearing', {
            schema: {
                bearing: { type: 'number', default: 0 },
                distance: { type: 'number', default: 3 },
                height: { type: 'number', default: 3 }
            },
            init: function () {
                const rad = THREE.MathUtils.degToRad(this.data.bearing);
                const x = this.data.distance * Math.sin(rad);
                const z = -this.data.distance * Math.cos(rad);
                this.el.setAttribute('position', { x: x, y: this.data.height, z: z });
            }
        });

        // Robust animation starter — waits for model to fully load
        AFRAME.registerComponent('play-all-animations', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (!mesh) return;

                    const mixer = new THREE.AnimationMixer(mesh);
                    const clips = mesh.animations || 
                                  (this.el.components['gltf-model'] && 
                                   this.el.components['gltf-model'].model && 
                                   this.el.components['gltf-model'].model.animations) || [];

                    console.log('Available animation clips:', clips.map(c => c.name));

                    if (clips.length === 0) {
                        console.warn('No animations found on this model.');
                        return;
                    }

                    // Play all clips (or change index to pick one)
                    clips.forEach(clip => {
                        mixer.clipAction(clip).play();
                    });

                    // Tick the mixer every frame
                    this.mixer = mixer;
                    this.lastTime = performance.now();
                });
            },
            tick: function () {
                if (!this.mixer) return;
                const now = performance.now();
                this.mixer.update((now - this.lastTime) / 1000);
                this.lastTime = now;
            }
        });
    </script>
</head>
<body style='margin: 0; overflow: hidden;'>
    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs='sourceType: webcam; debugUIEnabled: false;'>

        <a-assets>
            <a-asset-item id="dog" response-type="arraybuffer" src="./Dog.glb"></a-asset-item>
        </a-assets>

        <a-entity place-at-bearing="bearing: 0; distance: 3; height: 3">
            <a-entity
                gltf-model="#dog"
                scale="0.5 0.5 0.5"
                rotation="0 0 0"
                play-all-animations>
            </a-entity>
        </a-entity>

        <a-camera look-controls="enabled: true"></a-camera>

    </a-scene>
</body>
</html>
