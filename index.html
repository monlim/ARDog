<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>

    <script>
      // Places the entity at the user's current GPS location, offset by
      // `forwardMeters` in the direction the device compass is facing,
      // and `aboveHeadMeters` above an assumed 1.8 m head height.
      AFRAME.registerComponent('gps-relative-place', {
        schema: {
          forwardMeters:    { type: 'number', default: 1 },
          aboveHeadMeters:  { type: 'number', default: 2 }
        },

        init: function () {
          this.compassHeading = 0;

          // --- Compass heading ---
          // iOS supplies webkitCompassHeading (degrees clockwise from north).
          // Android with absolute orientation supplies alpha (degrees CCW from north
          // on some browsers) – we negate and normalise to get CW-from-north.
          const onOrientation = (e) => {
            if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
              this.compassHeading = e.webkitCompassHeading;
            } else if (e.alpha !== null) {
              this.compassHeading = (360 - e.alpha) % 360;
            }
          };
          window.addEventListener('deviceorientationabsolute', onOrientation, true);
          window.addEventListener('deviceorientation',         onOrientation, true);

          // --- GPS position ---
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const lat     = pos.coords.latitude;
              const lon     = pos.coords.longitude;
              const heading = this.compassHeading;

              const forwardM    = this.data.forwardMeters;
              const headingRad  = (heading * Math.PI) / 180;

              // 1 degree latitude  ≈ 111 111 m
              // 1 degree longitude ≈ 111 111 * cos(lat) m
              const mPerDegLat = 111111;
              const mPerDegLon = 111111 * Math.cos(lat * Math.PI / 180);

              const newLat = lat + (forwardM * Math.cos(headingRad)) / mPerDegLat;
              const newLon = lon + (forwardM * Math.sin(headingRad)) / mPerDegLon;

              // Y = assumed head height (1.8 m) + desired clearance above head
              const yOffset = 1.8 + this.data.aboveHeadMeters;

              this.el.setAttribute('gps-entity-place', `latitude: ${newLat}; longitude: ${newLon};`);
              this.el.setAttribute('position',         `0 ${yOffset} 0`);

              console.log(`Dog placed at ${newLat.toFixed(7)}, ${newLon.toFixed(7)}, Y=${yOffset} m`);
            },
            (err) => console.error('Geolocation error:', err),
            { enableHighAccuracy: true, timeout: 10000 }
          );
        }
      });
    </script>
  </head>

  <body style="margin:0; overflow:hidden;">

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

      <a-assets>
        <a-asset-item id="dog" src="./Dog.glb"></a-asset-item>
      </a-assets>

      <!-- Dog entity: placed 1 m in front and 2 m above the user's head -->
      <a-entity
        id="dog-entity"
        gltf-model="#dog"
        scale="1 1 1"
        rotation="0 0 0"
        animation-mixer="clip: Animation; loop: repeat"
        gps-relative-place="forwardMeters: 1; aboveHeadMeters: 2">
      </a-entity>

      <a-camera gps-camera rotation-reader></a-camera>

    </a-scene>

  </body>
</html>
